spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/springboot_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456  # ⚠️ 替换为您的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20      # 最大连接数
      minimum-idle: 5            # 最小空闲连接
      connection-timeout: 30000  # 连接超时（毫秒）
      idle-timeout: 600000       # 空闲超时（毫秒）
      max-lifetime: 1800000      # 最大生命周期（毫秒）

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update  # 自动更新表结构（开发环境使用）
    show-sql: true      # 控制台显示 SQL（学习用）
    properties:
      hibernate:
        format_sql: true  # 格式化 SQL 输出

server:
  port: 8080  # 服务端口